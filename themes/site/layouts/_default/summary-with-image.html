{{ $featured_image := partial "func/GetFeaturedImage.html" . }}
<article>
  <div>
    <div class="">
      {{ if $featured_image -}}
      <div class="card-image">
        <a href="{{.RelPermalink}}" aria-hidden="true" tabindex="-1">
          <figure class="image is-fullwidth">
          {{ if (reflect.IsResource $featured_image) }}
            {{ $small := $featured_image.Resize "480x webp" }}
            {{ $medium := $featured_image.Resize "800x webp" }}
            {{ $large := $featured_image.Resize "1200x webp" }}
            <img
              src="{{ $medium.RelPermalink }}"
              srcset="{{ $small.RelPermalink }} 480w, {{ $medium.RelPermalink }} 800w, {{ $large.RelPermalink }} 1200w"
              sizes="(min-width: 1408px) 960px, (min-width: 1024px) calc(100vw - 24rem), calc(100vw - 4.5rem)"
              width="{{ $large.Width }}"
              height="{{ $large.Height }}"
              alt="{{ .Params.featured_image_alt | default .Title }}"
              loading="eager"
              fetchpriority="high"
              decoding="async">
          {{ else }}
            <img
              src="{{ $featured_image }}"
              alt="{{ .Params.featured_image_alt | default .Title }}"
              loading="eager"
              fetchpriority="high"
              decoding="async">
          {{ end }}
          </figure>
        </a>
      </div>
      {{ end -}}
      <div>
        <h2 class="title is-2 mt-4">
          <a href="{{.RelPermalink}}">{{ .Title }}</a>
        </h2>
        <div class="content">
          {{ .Summary }}
        </div>
      </div>
    </div>
  </div>
</article>
