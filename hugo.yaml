baseURL: https://madajczyk.com
languageCode: en-us
title: Lee Madajczyk
theme: site

permalinks:
  archive: /archive/:year/:month/:day/:slug

params:
  author: Lee Madajczyk
  logo: icons/favicon-96x96.png
  description: Security Architecture. Cloud. AI.
  copyrightStartYear: 2000
  mainSections:
    - archive
  recentPostsNumber: 1
  search:
    resultLimit: 10
    threshold: 0.4

mediaTypes:
  text/markdown:
    suffixes:
      - md

outputFormats:
  jsonfeed:
    mediaType: "application/json"
    baseName: "feed"
    isPlainText: true
  SearchIndex:
    mediaType: "application/json"
    baseName: "search"
    isPlainText: true
  Markdown:
    mediaType: text/markdown
    baseName: index
    isPlainText: true
    isHTML: false
    rel: alternate
    permalinkable: false
  LLMsTxt:
    mediaType: text/plain
    baseName: llms
    isPlainText: true
    isHTML: false
    rel: alternate

outputs:
  home:
    - html
    - rss
    - jsonfeed
    - SearchIndex
    - LLMsTxt
  page:
    - html
    - Markdown
  section:
    - html
    - rss
    - Markdown
